services:
  web:
    build: .
    command: npm run start:web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3020
      HOSTNAME: 0.0.0.0
      DATA_ROOT: /app/data
    expose:
      - "3020"
    volumes:
      - xiaoshuojia-data:/app/data
    restart: unless-stopped

  worker:
    build: .
    command: npm run start:worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATA_ROOT: /app/data
    volumes:
      - xiaoshuojia-data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  xiaoshuojia-data:
  caddy_data:
  caddy_config:
